<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laundry Services Hamburger Menu</title>
    <style>
          *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f5f5f5;
    }

    /* Navbar */
    nav{
      width:100%;
      height:70px;
      background:white;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:0 20px;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
      position:fixed;
      top:0;
      z-index:1000;
    }

    .logo{
      font-size:32px;
      font-weight:bold;
      color:#222;
    }

    /* Hamburger Icon */
    .menu-btn{
      font-size:35px;
      cursor:pointer;
      color:#333;
    }

    /* Hide checkbox */
    #menu-toggle{
      display:none;
    }

    /* Sidebar Menu */
    .sidebar{
      position:fixed;
      top:0;
      right:-250px;
      width:250px;
      height:100%;
      background:#111;
      transition:0.4s;
      padding-top:100px;
      z-index:999;
    }

    .sidebar ul{
      list-style:none;
      text-align:center;
    }

    .sidebar ul li{
      margin:25px 0;
    }

    .sidebar ul li a{
      text-decoration:none;
      color:white;
      font-size:24px;
      transition:0.3s;
    }

    .sidebar ul li a:hover{
      color:#00aaff;
    }

    /* Show Menu When Clicked */
    #menu-toggle:checked ~ .sidebar{
      right:0;
    }

    /* Main Content */
    .content{
      margin-top:100px;
      padding:20px;
      text-align:center;
    }

    .content h1{
      font-size:45px;
      color:#222;
      margin-bottom:20px;
    }

    .content p{
      font-size:20px;
      color:#555;
      line-height:1.6;
    }

    .btn{
      display:inline-block;
      margin-top:25px;
      padding:15px 30px;
      background:#00aaff;
      color:white;
      border-radius:30px;
      text-decoration:none;
      font-size:20px;
    }

    .image img{
      width:250px;
      margin-top:40px;
    }

    /* Desktop View */
    @media(min-width:768px){

      .menu-btn{
        display:none;
      }

      .sidebar{
        position:static;
        width:auto;
        height:auto;
        background:none;
        padding-top:0;
        right:0;
      }

      .sidebar ul{
        display:flex;
        gap:25px;
      }

      .sidebar ul li{
        margin:0;
      }

      .sidebar ul li a{
        color:#222;
        font-size:20px;
      }
    }
  
    </style>
</head>
<body>
     <!-- Navbar -->
  <nav>
    <div class="logo">Logo</div>

    <!-- Checkbox -->
    <input type="checkbox" id="menu-toggle">

    <!-- Hamburger Icon -->
    <label for="menu-toggle" class="menu-btn">
      ☰
    </label>

    <!-- Menu -->
    <div class="sidebar">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">About Us</a></li>
        <li><a href="#">Contact Us</a></li>
      </ul>
    </div>
  </nav>

  <!-- Content -->
  <div class="content">
    <h1>
      Revitalize Your Clothes with Expert
      <span style="color:#00aaff;">Laundry Services!</span>
    </h1>

    <p>
      From premium dry cleaning to swift wash and fold,
      we deliver care and convenience.
    </p>

    <a href="#" class="btn">Book a service today!</a>

    <div class="image">
      <img src="https://cdn-icons-png.flaticon.com/512/3082/3082037.png" alt="Laundry">
    </div>
  </div>
</body>
</html>
